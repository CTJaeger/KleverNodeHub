<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klever Node Hub - Alerts</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div class="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#141416" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                </div>
                <span class="sidebar-title">Klever Node Hub</span>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-section-label">Navigation</div>
                <ul class="sidebar-nav">
                    <li class="sidebar-nav-item">
                        <a href="/overview" class="sidebar-nav-link">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                            Overview
                        </a>
                    </li>
                    <li class="sidebar-nav-item">
                        <a href="/alerts" class="sidebar-nav-link active">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                            Alerts
                        </a>
                    </li>
                </ul>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-section-label">System</div>
                <ul class="sidebar-nav">
                    <li class="sidebar-nav-item">
                        <a href="/settings" class="sidebar-nav-link">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                            Settings
                        </a>
                    </li>
                    <li class="sidebar-nav-item">
                        <a href="#" class="sidebar-nav-link" onclick="API.logout(); return false;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                            Logout
                        </a>
                    </li>
                </ul>
            </div>
        </aside>

        <main class="main-content">
            <div class="topbar">
                <button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
                <h1>Alerts</h1>
                <div style="width:36px"></div>
            </div>

            <!-- Page Header Bar -->
            <div class="page-header">
                <div class="page-header-left">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                    <span class="page-header-title">Alerts</span>
                </div>
            </div>

            <div class="page-body">
                <!-- Tabs -->
                <div class="card">
                    <div class="tabs">
                        <button class="tab active" onclick="switchTab('history')">Alert History</button>
                        <button class="tab" onclick="switchTab('rules')">Alert Rules</button>
                    </div>

                    <!-- Alert History Tab -->
                    <div id="tab-history" class="tab-content active" style="padding:16px;">
                        <div id="alerts-list">
                            <div class="empty-state">
                                <div class="loading-text" style="justify-content:center;">
                                    <div class="spinner"></div>
                                    <span>Loading alerts...</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Alert Rules Tab -->
                    <div id="tab-rules" class="tab-content" style="padding:16px;">
                        <div style="display:flex;justify-content:flex-end;margin-bottom:16px;">
                            <button class="btn btn-sm btn-primary" onclick="showAddRule()">+ Add Rule</button>
                        </div>
                        <div id="alert-rules-list"></div>

                        <!-- Add/Edit Rule Form -->
                        <div id="add-rule-form" class="hidden mt-16" style="border-top:1px solid var(--border);padding-top:16px;">
                            <h4 id="rule-form-title">Add Alert Rule</h4>
                            <input type="hidden" id="rule-id">
                            <div class="form-group">
                                <label class="form-label">Name</label>
                                <input class="form-input" id="rule-name" placeholder="e.g. High CPU Alert">
                            </div>
                            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                                <div class="form-group">
                                    <label class="form-label">Metric</label>
                                    <select class="form-input" id="rule-metric">
                                        <option value="klv_nonce">klv_nonce</option>
                                        <option value="klv_connectedPeers">klv_connectedPeers</option>
                                        <option value="klv_isSyncing">klv_isSyncing</option>
                                        <option value="cpu_percent">cpu_percent</option>
                                        <option value="mem_percent">mem_percent</option>
                                        <option value="disk_percent">disk_percent</option>
                                        <option value="agent.heartbeat">agent.heartbeat</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Condition</label>
                                    <select class="form-input" id="rule-condition">
                                        <option value="gt">Greater than (&gt;)</option>
                                        <option value="lt">Less than (&lt;)</option>
                                        <option value="eq">Equals (=)</option>
                                        <option value="stall">Stall (no change)</option>
                                    </select>
                                </div>
                            </div>
                            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
                                <div class="form-group">
                                    <label class="form-label">Threshold</label>
                                    <input class="form-input" id="rule-threshold" type="number" step="any" value="0">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Duration (sec)</label>
                                    <input class="form-input" id="rule-duration" type="number" value="0">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Cooldown (min)</label>
                                    <input class="form-input" id="rule-cooldown" type="number" value="5">
                                </div>
                            </div>
                            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                                <div class="form-group">
                                    <label class="form-label">Severity</label>
                                    <select class="form-input" id="rule-severity">
                                        <option value="critical">Critical</option>
                                        <option value="warning">Warning</option>
                                        <option value="info">Info</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Node Filter</label>
                                    <input class="form-input" id="rule-node-filter" value="*" placeholder="* for all nodes">
                                </div>
                            </div>
                            <div class="btn-group">
                                <button class="btn btn-primary btn-sm" onclick="saveRule()">Save Rule</button>
                                <button class="btn btn-secondary btn-sm" onclick="cancelRule()">Cancel</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div><!-- /page-body -->
        </main>
    </div>

    <script src="/static/js/api.js"></script>
    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebar-overlay').classList.toggle('active');
        }

        function switchTab(name) {
            document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
            document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); });
            document.querySelector('.tab[onclick*="' + name + '"]').classList.add('active');
            document.getElementById('tab-' + name).classList.add('active');
        }

        function esc(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // --- Alert History ---
        async function loadAlertHistory() {
            const data = await API.getJSON('/api/alerts/history?limit=50');
            if (!data) return;

            const alerts = data.alerts || [];
            const container = document.getElementById('alerts-list');

            if (alerts.length === 0) {
                container.textContent = '';
                const p = document.createElement('p');
                p.className = 'text-muted';
                p.style.padding = '16px';
                p.textContent = 'No alerts yet.';
                container.appendChild(p);
                return;
            }

            // Build table with DOM methods for safety
            const wrapper = document.createElement('div');
            wrapper.className = 'table-wrapper';
            const table = document.createElement('table');
            table.className = 'data-table';

            const thead = table.createTHead();
            const headerRow = thead.insertRow();
            ['Severity', 'Rule', 'Message', 'Time', 'State', ''].forEach(function(text) {
                const th = document.createElement('th');
                th.textContent = text;
                headerRow.appendChild(th);
            });

            const tbody = table.createTBody();
            alerts.forEach(function(a) {
                const row = tbody.insertRow();
                const sevBadge = a.severity === 'critical' ? 'badge-offline' : a.severity === 'warning' ? 'badge-syncing' : 'badge-online';
                const stateBadge = a.state === 'firing' ? 'badge-offline' : a.state === 'resolved' ? 'badge-online' : 'badge-syncing';
                const time = new Date((a.fired_at || a.created_at) * 1000).toLocaleString();

                const sevCell = row.insertCell();
                const sevSpan = document.createElement('span');
                sevSpan.className = 'badge ' + sevBadge;
                sevSpan.textContent = a.severity;
                sevCell.appendChild(sevSpan);

                const ruleCell = row.insertCell();
                const strong = document.createElement('strong');
                strong.textContent = a.rule_name;
                ruleCell.appendChild(strong);

                const msgCell = row.insertCell();
                msgCell.className = 'text-muted';
                msgCell.textContent = a.message;

                const timeCell = row.insertCell();
                timeCell.className = 'text-muted text-sm';
                timeCell.textContent = time;

                const stateCell = row.insertCell();
                const stateSpan = document.createElement('span');
                stateSpan.className = 'badge ' + stateBadge;
                stateSpan.textContent = a.state;
                stateCell.appendChild(stateSpan);

                const actionCell = row.insertCell();
                if (a.state === 'firing' && !a.acked) {
                    const btn = document.createElement('button');
                    btn.className = 'btn btn-sm btn-secondary';
                    btn.textContent = 'Ack';
                    btn.onclick = function() { ackAlert(a.id); };
                    actionCell.appendChild(btn);
                }
            });

            wrapper.appendChild(table);
            container.textContent = '';
            container.appendChild(wrapper);
        }

        async function ackAlert(id) {
            await API.postJSON('/api/alerts/' + id + '/acknowledge', {});
            loadAlertHistory();
        }

        // --- Alert Rules ---
        async function loadAlertRules() {
            const data = await API.getJSON('/api/alerts/rules');
            if (!data) return;

            const rules = data.rules || [];
            const container = document.getElementById('alert-rules-list');

            if (rules.length === 0) {
                container.textContent = '';
                const p = document.createElement('p');
                p.className = 'text-muted';
                p.textContent = 'No alert rules configured.';
                container.appendChild(p);
                return;
            }

            const wrapper = document.createElement('div');
            wrapper.className = 'table-wrapper';
            const table = document.createElement('table');
            table.className = 'data-table';

            const thead = table.createTHead();
            const headerRow = thead.insertRow();
            ['Name', 'Metric', 'Condition', 'Severity', 'Status', ''].forEach(function(text) {
                const th = document.createElement('th');
                th.textContent = text;
                headerRow.appendChild(th);
            });

            const condLabels = { gt: '>', lt: '<', eq: '=', stall: 'stall' };
            const tbody = table.createTBody();
            rules.forEach(function(r) {
                const row = tbody.insertRow();

                const nameCell = row.insertCell();
                const nameStrong = document.createElement('strong');
                nameStrong.textContent = r.name;
                nameCell.appendChild(nameStrong);
                if (r.builtin) {
                    const builtinSpan = document.createElement('span');
                    builtinSpan.className = 'text-sm text-muted';
                    builtinSpan.textContent = ' (built-in)';
                    nameCell.appendChild(builtinSpan);
                }

                const metricCell = row.insertCell();
                metricCell.className = 'text-muted';
                metricCell.textContent = r.metric_name;

                const condCell = row.insertCell();
                condCell.className = 'text-muted';
                condCell.textContent = (condLabels[r.condition] || r.condition) + ' ' + r.threshold +
                    (r.duration_sec > 0 ? ' for ' + r.duration_sec + 's' : '') + ', cooldown ' + r.cooldown_min + 'min';

                const sevCell = row.insertCell();
                const sevSpan = document.createElement('span');
                sevSpan.className = 'badge ' + (r.severity === 'critical' ? 'badge-offline' : r.severity === 'warning' ? 'badge-syncing' : 'badge-online');
                sevSpan.textContent = r.severity;
                sevCell.appendChild(sevSpan);

                const statusCell = row.insertCell();
                const statusSpan = document.createElement('span');
                statusSpan.className = 'badge ' + (r.enabled ? 'badge-online' : 'badge-offline');
                statusSpan.textContent = r.enabled ? 'enabled' : 'disabled';
                statusCell.appendChild(statusSpan);

                const actionCell = row.insertCell();
                const editBtn = document.createElement('button');
                editBtn.className = 'btn btn-sm btn-secondary';
                editBtn.textContent = 'Edit';
                editBtn.style.marginRight = '4px';
                editBtn.onclick = function() { editRule(r.id); };
                actionCell.appendChild(editBtn);
                if (!r.builtin) {
                    const delBtn = document.createElement('button');
                    delBtn.className = 'btn btn-sm btn-secondary';
                    delBtn.textContent = 'Del';
                    delBtn.onclick = function() { deleteRule(r.id); };
                    actionCell.appendChild(delBtn);
                }
            });

            wrapper.appendChild(table);
            container.textContent = '';
            container.appendChild(wrapper);
        }

        function showAddRule() {
            document.getElementById('add-rule-form').classList.remove('hidden');
            document.getElementById('rule-form-title').textContent = 'Add Alert Rule';
            document.getElementById('rule-id').value = '';
            document.getElementById('rule-name').value = '';
            document.getElementById('rule-metric').value = 'cpu_percent';
            document.getElementById('rule-condition').value = 'gt';
            document.getElementById('rule-threshold').value = '90';
            document.getElementById('rule-duration').value = '0';
            document.getElementById('rule-cooldown').value = '5';
            document.getElementById('rule-severity').value = 'warning';
            document.getElementById('rule-node-filter').value = '*';
        }

        async function editRule(id) {
            const data = await API.getJSON('/api/alerts/rules');
            if (!data) return;
            const rule = (data.rules || []).find(function(r) { return r.id === id; });
            if (!rule) return;

            document.getElementById('add-rule-form').classList.remove('hidden');
            document.getElementById('rule-form-title').textContent = 'Edit Alert Rule';
            document.getElementById('rule-id').value = rule.id;
            document.getElementById('rule-name').value = rule.name;
            document.getElementById('rule-metric').value = rule.metric_name;
            document.getElementById('rule-condition').value = rule.condition;
            document.getElementById('rule-threshold').value = rule.threshold;
            document.getElementById('rule-duration').value = rule.duration_sec;
            document.getElementById('rule-cooldown').value = rule.cooldown_min;
            document.getElementById('rule-severity').value = rule.severity;
            document.getElementById('rule-node-filter').value = rule.node_filter;
        }

        function cancelRule() {
            document.getElementById('add-rule-form').classList.add('hidden');
        }

        async function saveRule() {
            const rule = {
                name: document.getElementById('rule-name').value,
                metric_name: document.getElementById('rule-metric').value,
                condition: document.getElementById('rule-condition').value,
                threshold: parseFloat(document.getElementById('rule-threshold').value) || 0,
                duration_sec: parseInt(document.getElementById('rule-duration').value) || 0,
                cooldown_min: parseInt(document.getElementById('rule-cooldown').value) || 5,
                severity: document.getElementById('rule-severity').value,
                node_filter: document.getElementById('rule-node-filter').value || '*',
                enabled: true
            };

            const id = document.getElementById('rule-id').value;
            if (id) rule.id = id;

            const result = await API.postJSON('/api/alerts/rules', rule);
            if (result && result.ok) {
                cancelRule();
                loadAlertRules();
            }
        }

        async function deleteRule(id) {
            if (!confirm('Delete this alert rule?')) return;
            await API.request('/api/alerts/rules/' + id, { method: 'DELETE' });
            loadAlertRules();
        }

        // Init
        loadAlertHistory();
        loadAlertRules();
    </script>
</body>
</html>
