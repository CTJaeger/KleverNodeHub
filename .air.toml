root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/dashboard"
  cmd = "go build -o ./tmp/dashboard ./cmd/dashboard"
  delay = 500
  exclude_dir = ["tmp", "vendor", ".git", "node_modules"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "html", "css", "js"]
  kill_delay = 500

[log]
  time = false

[misc]
  clean_on_exit = true
