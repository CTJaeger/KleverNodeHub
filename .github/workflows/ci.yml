name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: '1.26'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests
        run: go test ./... -v -race -count=1 -coverprofile=coverage.out

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Check formatting
        run: |
          diff=$(goimports -l .)
          if [ -n "$diff" ]; then
            echo "The following files are not formatted:"
            echo "$diff"
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

      - name: Run go vet
        run: go vet ./...

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  build:
    name: Build
    needs: [test, lint]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set build variables
        id: vars
        run: |
          echo "version=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build Dashboard
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: >-
          go build -ldflags="-s -w
          -X github.com/CTJaeger/KleverNodeHub/internal/version.Version=${{ steps.vars.outputs.version }}
          -X github.com/CTJaeger/KleverNodeHub/internal/version.GitCommit=${{ steps.vars.outputs.commit }}
          -X github.com/CTJaeger/KleverNodeHub/internal/version.BuildTime=${{ steps.vars.outputs.build_time }}"
          -o klever-node-hub-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/dashboard

      - name: Build Agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: >-
          go build -ldflags="-s -w
          -X github.com/CTJaeger/KleverNodeHub/internal/version.Version=${{ steps.vars.outputs.version }}
          -X github.com/CTJaeger/KleverNodeHub/internal/version.GitCommit=${{ steps.vars.outputs.commit }}
          -X github.com/CTJaeger/KleverNodeHub/internal/version.BuildTime=${{ steps.vars.outputs.build_time }}"
          -o klever-agent-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/agent
