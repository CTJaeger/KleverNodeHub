name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: '1.26'
  DOCKER_HUB_REPO: ctjaeger/klever-node-hub
  DOCKER_HUB_AGENT_REPO: ctjaeger/klever-agent

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests
        run: go test ./... -v -race

  build:
    name: Build
    needs: [test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set build variables
        id: vars
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi
          echo "ext=$EXT" >> "$GITHUB_OUTPUT"

      - name: Build Dashboard
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: >-
          go build -ldflags="-s -w
          -X github.com/CTJaeger/KleverNodeHub/internal/version.Version=${{ steps.vars.outputs.version }}
          -X github.com/CTJaeger/KleverNodeHub/internal/version.GitCommit=${{ steps.vars.outputs.commit }}
          -X github.com/CTJaeger/KleverNodeHub/internal/version.BuildTime=${{ steps.vars.outputs.build_time }}"
          -o bin/klever-node-hub-${{ matrix.goos }}-${{ matrix.goarch }}${{ steps.vars.outputs.ext }} ./cmd/dashboard

      - name: Build Agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: >-
          go build -ldflags="-s -w
          -X github.com/CTJaeger/KleverNodeHub/internal/version.Version=${{ steps.vars.outputs.version }}
          -X github.com/CTJaeger/KleverNodeHub/internal/version.GitCommit=${{ steps.vars.outputs.commit }}
          -X github.com/CTJaeger/KleverNodeHub/internal/version.BuildTime=${{ steps.vars.outputs.build_time }}"
          -o bin/klever-agent-${{ matrix.goos }}-${{ matrix.goarch }}${{ steps.vars.outputs.ext }} ./cmd/agent

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/

  docker:
    name: Docker
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set build variables
        id: vars
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Dashboard
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
            GIT_COMMIT=${{ steps.vars.outputs.commit }}
            BUILD_TIME=${{ steps.vars.outputs.build_time }}
          tags: |
            ${{ env.DOCKER_HUB_REPO }}:${{ steps.vars.outputs.version }}
            ${{ env.DOCKER_HUB_REPO }}:latest

      - name: Build and push Agent
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.agent
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
            GIT_COMMIT=${{ steps.vars.outputs.commit }}
            BUILD_TIME=${{ steps.vars.outputs.build_time }}
          tags: |
            ${{ env.DOCKER_HUB_AGENT_REPO }}:${{ steps.vars.outputs.version }}
            ${{ env.DOCKER_HUB_AGENT_REPO }}:latest

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: binaries-*
          merge-multiple: true

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*
